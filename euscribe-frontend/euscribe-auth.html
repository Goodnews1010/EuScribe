<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EuScribe — Smart Writing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh;
        overflow: hidden;
        background: #0e0e0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        font-family: "DM Sans", sans-serif;
      }

      /* ── Brand ── */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1rem;
        text-decoration: none;
      }

      .brand-name {
        font-family: "Syne", sans-serif;
        font-size: 23px;
        font-weight: 700;
        color: #4f8cff;
      }

      .brand-name span {
        color: #e6edf3;
      }

      /* ── Card ── */
      .card {
        background: #1a1a1c;
        border: 0.5px solid #2e2e30;
        border-radius: 16px;
        padding: 1.5rem;
        width: 100%;
        max-width: 448px;
      }

      .card-title {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: #f0f0f0;
        margin-bottom: 5px;
      }

      .card-sub {
        font-size: 14px;
        color: #777;
        margin-bottom: 1.75rem;
      }

      /* ── Social buttons ── */
      .social-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 1.5rem;
      }

      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 10px 0;
        background: #232325;
        border: 0.5px solid #2e2e30;
        border-radius: 8px;
        color: #b0b0b0;
        font-size: 13px;
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }

      .social-btn:hover {
        background: #2a2a2d;
        border-color: #484848;
        color: #f0f0f0;
      }

      .social-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 1.5rem;
      }

      .divider-line {
        flex: 1;
        height: 0.5px;
        background: #2e2e30;
      }

      .divider-text {
        font-size: 12px;
        color: #555;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      /* ── Form fields ── */
      .field-label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: #888;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .field-input {
        width: 100%;
        background: #111113;
        border: 0.5px solid #2e2e30;
        border-radius: 8px;
        padding: 11px 14px;
        color: #e0e0e0;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        margin-bottom: 1rem;
        outline: none;
        transition: border-color 0.15s;
      }

      .field-input:focus {
        border-color: #4f8cff;
      }
      .field-input::placeholder {
        color: #3e3e40;
      }

      /* ── Primary button ── */
      .primary-btn {
        width: 100%;
        padding: 13px;
        background: #161b22;
        border: 1px solid #9aa4b2;
        border-radius: 9px;
        color: #4f8cff;
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        margin-bottom: 1.25rem;
        letter-spacing: 0.02em;
      }

      .primary-btn:hover {
        background: #4f8cff;
        color: #fff;
        border-color: #4f8cff;
        transform: scale(1.04);
      }
      .primary-btn:active {
        transform: scale(0.99);
      }

      /* ── Switch line ── */
      .switch-line {
        text-align: center;
        font-size: 13.5px;
        color: #666;
      }

      .switch-link {
        color: #e6edf3;
        cursor: pointer;
        font-weight: 500;
        background: none;
        border: none;
        font-size: 13.5px;
        font-family: "DM Sans", sans-serif;
        padding: 0;
      }

      .switch-link:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none;
      }
      .toast {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 16px;
        animation: toastIn 0.3s ease;
      }
      .toast.show {
        display: flex;
      }
      .toast.error {
        background: rgba(255, 92, 92, 0.08);
        border: 1px solid rgba(255, 92, 92, 0.25);
        color: #ff7070;
      }
      .toast.success {
        background: rgba(61, 214, 140, 0.08);
        border: 1px solid rgba(61, 214, 140, 0.25);
        color: #3dd68c;
      }
      .toast-icon {
        font-size: 15px;
        flex-shrink: 0;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Forgot link ── */
      .forgot-link {
        color: #4f8cff;
        cursor: pointer;
        font-weight: 500;
        background: none;
        border: none;
        font-size: 12px;
        font-family: "DM Sans", sans-serif;
        padding: 0;
      }
      .forgot-link:hover { text-decoration: underline; }

      /* ── Eye toggle (ADDED) ── */
      .pw-wrap {
        position: relative;
        margin-bottom: 1rem;
      }
      .pw-wrap .field-input {
        margin-bottom: 0;
        padding-right: 42px;
      }
      .eye-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #555;
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s;
      }
      .eye-btn:hover { color: #aaa; }
      .eye-btn svg {
        width: 18px;
        height: 18px;
        pointer-events: none;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .card {
          padding: 1.75rem 1.25rem;
        }
        .social-btn {
          font-size: 12px;
          gap: 5px;
        }
      }
    </style>
  </head>
  <body>
    <a class="brand" href="#">
      <span class="brand-name">Eu<span>Scribe</span></span>
    </a>

    <div class="card" id="login-card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your writing space</div>

      <div class="social-grid">
        <button class="social-btn" type="button" onclick="socialLogin('Google')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn" type="button" onclick="socialLogin('Facebook')">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
          </svg>
          Facebook
        </button>
        <button class="social-btn" type="button" onclick="socialLogin('GitHub')">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" fill="#f0f0f0"/>
          </svg>
          GitHub
        </button>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with email</span>
        <div class="divider-line"></div>
      </div>
      <div class="toast" id="login-toast">
        <span class="toast-icon" id="login-toast-icon"></span>
        <span id="login-toast-msg"></span>
      </div>
      <form onsubmit="handleSignIn(event)">
        <label class="field-label" for="login-email">Email</label>
        <input
          class="field-input"
          id="login-email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />

        <label class="field-label" for="login-password">Password</label>
        <div class="pw-wrap">
          <input
            class="field-input"
            id="login-password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-btn" onclick="togglePw('login-password', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button class="primary-btn" type="submit">Sign In</button>
      </form>

      <p class="switch-line" style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#666">No account? <button class="switch-link" type="button" onclick="toggle('signup')">Create one</button></span>
        <button class="forgot-link" type="button" onclick="toggle('forgot')">Forgot password?</button>
      </p>
    </div>

    <!-- ── FORGOT PASSWORD CARD ── -->
    <div class="card hidden" id="forgot-card">
      <div class="card-title">Reset password</div>
      <div class="card-sub">Enter your email and we'll send a reset link</div>
      <div class="toast" id="forgot-toast">
        <span class="toast-icon" id="forgot-toast-icon"></span>
        <span id="forgot-toast-msg"></span>
      </div>
      <form onsubmit="handleForgot(event)">
        <label class="field-label" for="forgot-email">Email Address</label>
        <input class="field-input" id="forgot-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        <button class="primary-btn" type="submit" id="forgot-btn">Send Reset Link</button>
      </form>
      <p class="switch-line">
        Remember it? <button class="switch-link" type="button" onclick="toggle('login')">Back to Sign In</button>
      </p>
    </div>

    <!-- ── RESET PASSWORD CARD ── -->
    <div class="card hidden" id="reset-card">
      <div class="card-title">New password</div>
      <div class="card-sub">Enter your new password below</div>
      <div class="toast" id="reset-toast">
        <span class="toast-icon" id="reset-toast-icon"></span>
        <span id="reset-toast-msg"></span>
      </div>
      <form onsubmit="handleReset(event)">
        <label class="field-label" for="reset-password">New Password</label>
        <div class="pw-wrap">
          <input class="field-input" id="reset-password" type="password" placeholder="Min. 6 characters" required />
          <button type="button" class="eye-btn" onclick="togglePw('reset-password', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <label class="field-label" for="reset-password2">Confirm Password</label>
        <div class="pw-wrap">
          <input class="field-input" id="reset-password2" type="password" placeholder="Repeat your password" required />
          <button type="button" class="eye-btn" onclick="togglePw('reset-password2', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button class="primary-btn" type="submit" id="reset-btn">Reset Password</button>
      </form>
    </div>

    <div class="card hidden" id="signup-card">
      <div class="card-title">Create account</div>
      <div class="card-sub">Start writing with AI at your side</div>

      <div class="social-grid">
        <button class="social-btn" type="button" onclick="socialLogin('Google')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn" type="button" onclick="socialLogin('Facebook')">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
          </svg>
          Facebook
        </button>
        <button class="social-btn" type="button" onclick="socialLogin('GitHub')">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" fill="#f0f0f0"/>
          </svg>
          GitHub
        </button>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with email</span>
        <div class="divider-line"></div>
      </div>
      <div class="toast" id="signup-toast">
        <span class="toast-icon" id="signup-toast-icon"></span>
        <span id="signup-toast-msg"></span>
      </div>
      <form onsubmit="handleSignUp(event)">
        <label class="field-label" for="signup-name">Your Name</label>
        <input
          class="field-input"
          id="signup-name"
          type="text"
          placeholder="Ada Lovelace"
          autocomplete="name"
          required
        />

        <label class="field-label" for="signup-email">Email</label>
        <input
          class="field-input"
          id="signup-email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />

        <label class="field-label" for="signup-password">Password</label>
        <div class="pw-wrap">
          <input
            class="field-input"
            id="signup-password"
            type="password"
            placeholder="Min. 6 characters"
            autocomplete="new-password"
            required
          />
          <button type="button" class="eye-btn" onclick="togglePw('signup-password', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button class="primary-btn" type="submit">Create Account</button>
      </form>

      <p class="switch-line">
        Already have one?
        <button class="switch-link" type="button" onclick="toggle('login')">
          Sign in
        </button>
      </p>
    </div>

    <script>
      const API = "https://euscribe.onrender.com";

      // ── Eye toggle (ADDED) ──
      const eyeOpen = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      const eyeClosed = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

      function togglePw(inputId, btn) {
        const inp = document.getElementById(inputId);
        const showing = inp.type === "text";
        inp.type = showing ? "password" : "text";
        btn.innerHTML = showing ? eyeOpen : eyeClosed;
        btn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
      }

      function showToast(cardPrefix, message, type = "error") {
        const toast = document.getElementById(cardPrefix + "-toast");
        const msg = document.getElementById(cardPrefix + "-toast-msg");
        const icon = document.getElementById(cardPrefix + "-toast-icon");
        toast.className = `toast show ${type}`;
        msg.textContent = message;
        icon.textContent = type === "error" ? "✕" : "✓";
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove("show"), 4000);
      }

      let resetToken = null;

      // Check for reset token in URL on load
      (function checkResetToken() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('reset');
        if (token) {
          resetToken = token;
          window.history.replaceState({}, document.title, window.location.pathname);
          toggle('reset');
        }
      })();

      function toggle(view) {
        ['login', 'signup', 'forgot', 'reset'].forEach(id => {
          const el = document.getElementById(id + '-card');
          if (el) el.classList.toggle('hidden', id !== view);
        });
      }

      function socialLogin(provider) {
        if (provider === "Google") {
          window.location.href =
            "https://euscribe.onrender.com/api/auth/google";
        } else if (provider === "GitHub") {
          window.location.href =
            "https://euscribe.onrender.com/api/auth/github";
        } else {
          showToast('login', provider + ' coming soon!')
        }
      }

      async function handleSignIn(event) {
        event.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const pass = document.getElementById("login-password").value;
        if (!email || !pass) {
          showToast('login', 'Please fill in all fields.')
          return;
        }

        const btn = document.querySelector("#login-card .primary-btn");
        btn.textContent = "Signing in...";
        btn.disabled = true;

        try {
          const res = await fetch(`${API}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password: pass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          // Clear previous user's documents before logging in new user
          localStorage.removeItem("euscribeDocuments");
          localStorage.removeItem("euscribe_id_map");

          localStorage.setItem("euscribe_token", data.token);
          localStorage.setItem("euscribe_user_name", data.user.name);
          localStorage.setItem("euscribe_user_email", data.user.email);
          localStorage.setItem("euscribe_is_admin", data.user.isAdmin);

          localStorage.removeItem("euscribe_onboarded_v2");

          window.location.href = data.user.isAdmin ? "admin.html" : "index.html";
        } catch (err) {
          showToast('login', err.message || 'Login failed')
          btn.textContent = "Sign In";
          btn.disabled = false;
        }
      }

      async function handleSignUp(event) {
        event.preventDefault();
        const name = document.getElementById("signup-name").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const pass = document.getElementById("signup-password").value;
        if (!name || !email || !pass) {
          showToast('signup', 'Please fill in all fields.')
          return;
        }
        if (pass.length < 6) {
          showToast('signup', 'Password must be at least 6 characters.')
          return;
        }

        const btn = document.querySelector("#signup-card .primary-btn");
        btn.textContent = "Creating account...";
        btn.disabled = true;

        try {
          const res = await fetch(`${API}/api/auth/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password: pass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          // Clear previous user's documents before logging in new user
          localStorage.removeItem("euscribeDocuments");
          localStorage.removeItem("euscribe_id_map");

          localStorage.setItem("euscribe_token", data.token);
          localStorage.setItem("euscribe_user_name", data.user.name);
          localStorage.setItem("euscribe_user_email", data.user.email);
          localStorage.setItem("euscribe_is_admin", data.user.isAdmin);


          localStorage.removeItem("euscribe_onboarded_v2");

          window.location.href = data.user.isAdmin ? "admin.html" : "index.html";
        } catch (err) {
          showToast('signup', err.message || 'Signup failed')
          btn.textContent = "Create Account";
          btn.disabled = false;
        }
      }

      async function handleForgot(event) {
        event.preventDefault();
        const email = document.getElementById("forgot-email").value.trim();
        if (!email) { showToast('forgot', 'Please enter your email.'); return; }

        const btn = document.getElementById("forgot-btn");
        btn.textContent = "Sending...";
        btn.disabled = true;

        try {
          const res = await fetch(`${API}/api/password/forgot`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('forgot', 'Reset link sent! Check your email.', 'success');
          document.getElementById("forgot-email").value = '';
        } catch (err) {
          showToast('forgot', err.message || 'Failed to send reset email');
        } finally {
          btn.textContent = "Send Reset Link";
          btn.disabled = false;
        }
      }

      async function handleReset(event) {
        event.preventDefault();
        const password = document.getElementById("reset-password").value;
        const password2 = document.getElementById("reset-password2").value;
        if (!password || !password2) { showToast('reset', 'Please fill in both fields.'); return; }
        if (password.length < 6) { showToast('reset', 'Password must be at least 6 characters.'); return; }
        if (password !== password2) { showToast('reset', 'Passwords do not match.'); return; }
        if (!resetToken) { showToast('reset', 'Invalid reset link. Please request a new one.'); return; }

        const btn = document.getElementById("reset-btn");
        btn.textContent = "Resetting...";
        btn.disabled = true;

        try {
          const res = await fetch(`${API}/api/password/reset`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: resetToken, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          showToast('reset', 'Password reset! Redirecting to login...', 'success');
          resetToken = null;
          setTimeout(() => toggle('login'), 2000);
        } catch (err) {
          showToast('reset', err.message || 'Failed to reset password');
        } finally {
          btn.textContent = "Reset Password";
          btn.disabled = false;
        }
      }

      // Enter key support
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const loginVisible = !document
          .getElementById("login-card")
          .classList.contains("hidden");
        if (loginVisible) handleSignIn();
        else handleSignUp();
      });
    </script>
  </body>
</html>
